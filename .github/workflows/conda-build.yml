name: conda-build (macos + windows)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Which platform(s) to build'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - windows-only
          - macos-only

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            subdir: osx-64
            artifact: osx-64
            os_group: macos
          - runner: macos-14
            subdir: osx-arm64
            artifact: osx-arm64
            os_group: macos
          - runner: windows-latest
            subdir: win-64
            artifact: win-64
            os_group: windows
          - runner: windows-latest
            subdir: win-32
            artifact: win-32
            os_group: windows
          - runner: windows-latest
            subdir: win-arm64
            artifact: win-arm64
            os_group: windows
      
    steps:
      - name: Check platform filter
        id: filter
        shell: bash
        run: |
          PLATFORM="${{ github.event.inputs.platform || 'all' }}"
          OS_GROUP="${{ matrix.os_group }}"
          if [[ "$PLATFORM" == "all" || "$PLATFORM" == "${OS_GROUP}-only" ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
#        if: steps.filter.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.ref || '' }}
            fetch-depth: 0 # Fetches full history so conda-build can correctly read git logs/tags if needed

      - name: Setup Miniforge (conda-forge)
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Miniforge3
          miniforge-version: latest
          use-mamba: true
          auto-activate-base: true
          channels: conda-forge
          channel-priority: strict
          
      # macOS / linux-like: bash is fine
      - name: Install build tooling (macOS)
        if: runner.os != 'Windows' && steps.filter.outputs.run == 'true'
        shell: bash -l {0}
        run: |
          mamba install -y conda-build conda-verify pip
          conda --version
          conda-build --version

      - name: Build (macOS)
        if: runner.os != 'Windows' && steps.filter.outputs.run == 'true'
        shell: bash -l {0}
        run: |
          echo "CONDA_BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV
          export CONDA_BUILD_NUMBER="${{ github.run_number }}"
          mkdir -p conda_pkgs
          conda-build ./conda \
            --output-folder ./conda_pkgs \
            --no-anaconda-upload

      # Windows: use PowerShell + conda run so PATH/activation isn't a problem
      - name: Install build tooling (Windows)
        if: runner.os == 'Windows' && steps.filter.outputs.run == 'true'
        shell: pwsh
        run: |
          mamba create -y -n build -c conda-forge python=3.11 conda-build conda-verify pip
          conda run -n build conda-build --version
          conda run -n build conda-verify --version

      - name: Build (Windows)
        if: runner.os == 'Windows' && steps.filter.outputs.run == 'true'
        shell: pwsh
        run: |
          $env:CONDA_BUILD_NUMBER = "${{ github.run_number }}"
          echo "CONDA_BUILD_NUMBER=${{ github.run_number }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          New-Item -ItemType Directory -Force -Path conda_pkgs | Out-Null
          conda run -n build conda-build .\conda `
            -c conda-forge `
            --override-channels `
            --output-folder .\conda_pkgs `
            --no-anaconda-upload

#      - name: Test (Windows)
#        if: runner.os == 'Windows'
        #&& steps.filter.outputs.run == 'true'
#        shell: pwsh
 #       run: |
  #        $pkg = Get-ChildItem -Recurse -Path .\conda_pkgs -Filter "*.conda" | Select-Object -First 1
   #       mamba create -y -n test -c conda-forge -c ./conda_pkgs movinglines
#
 #         $prefix = conda run -n test python -c "import sys; print(sys.prefix)"
  #        $env:PATH = "$prefix\Library\bin;$env:PATH"
#
 #         # Run your non-GUI tests
  #        conda run -n test python -c "import movinglines; print('import OK')"
   #       conda run -n test python -c "import os, movinglines; pkg_dir = os.path.dirname(movinglines.__file__); assert os.path.exists(os.path.join(pkg_dir, 'your_file.txt')), 'Missing file!'"
            
      - name: Show built packages
        shell: bash -l {0}
        run: |
          find ./conda_pkgs -type f \( -name "*.conda" -o -name "*.tar.bz2" \) -print

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: conda-${{ matrix.artifact }}-attempt${{ github.run_attempt }}
          path: conda_pkgs/**
          if-no-files-found: error
